<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <rect x="0" y="196" width="800" height="4" rx="2" fill="url(#accent)" opacity="0.4"/>
  <!-- icon: phone with signal -->
  <g transform="translate(280, 50)">
    <rect x="0" y="0" width="32" height="52" rx="6" stroke="#3b82f6" stroke-width="2.5" fill="none"/>
    <circle cx="16" cy="44" r="2.5" fill="#3b82f6"/>
    <rect x="8" y="6" width="16" height="28" rx="2" fill="#3b82f6" opacity="0.15"/>
    <!-- signal waves -->
    <path d="M38 18 Q44 10 50 18" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M38 12 Q48 0 58 12" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.25"/>
  </g>
  <!-- text -->
  <text x="350" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#fafafa" letter-spacing="-1">VibeLink</text>
  <text x="280" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#a1a1aa">your phone. your claude. your network.</text>
  <text x="280" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#52525b">self-hosted mobile companion for Claude Code</text>
</svg>
