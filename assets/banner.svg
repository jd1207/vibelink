<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- phone icon -->
  <g transform="translate(258, 28)">
    <rect x="0" y="0" width="28" height="46" rx="5" stroke="#D97706" stroke-width="2.2" fill="none"/>
    <circle cx="14" cy="39" r="2" fill="#D97706"/>
    <rect x="6" y="5" width="16" height="24" rx="1.5" fill="#D97706" opacity="0.12"/>
    <!-- streaming dots -->
    <circle cx="10" cy="15" r="1.5" fill="#D97706" opacity="0.6"/>
    <circle cx="14" cy="15" r="1.5" fill="#D97706" opacity="0.4"/>
    <circle cx="18" cy="15" r="1.5" fill="#D97706" opacity="0.2"/>
    <!-- signal -->
    <path d="M34 14 Q38 8 42 14" stroke="#D97706" stroke-width="1.8" fill="none" opacity="0.5"/>
    <path d="M34 9 Q40 1 46 9" stroke="#D97706" stroke-width="1.8" fill="none" opacity="0.3"/>
  </g>
  <!-- title -->
  <text x="314" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="url(#accent)" letter-spacing="-1">VibeLink</text>
  <!-- tagline -->
  <text x="400" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#8B8B8B" text-anchor="middle">your phone  ·  your claude  ·  your network</text>
  <!-- subtitle -->
  <text x="400" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B" text-anchor="middle">self-hosted mobile companion for Claude Code</text>
  <!-- accent line -->
  <line x1="320" y1="148" x2="480" y2="148" stroke="url(#accent)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
